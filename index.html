<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffd6e8">
<title>魔法英语乐园</title>
<link rel="manifest" href="manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, sans-serif;
  background: linear-gradient(160deg, #ffe5f1 0%, #e8e5ff 55%, #dff3ff 100%);
  background-attachment: fixed;
  color: #5a4a6a;
  user-select: none; -webkit-user-select: none;
  overflow: hidden;
}
#app { height: 100%; display: flex; flex-direction: column; max-width: 520px; margin: 0 auto; }

/* ---- 顶栏 ---- */
#topbar {
  flex: 0 0 auto; display: flex; align-items: center; gap: 8px;
  padding: calc(env(safe-area-inset-top, 0px) + 10px) 14px 10px;
}
#backBtn {
  width: 38px; height: 38px; border: none; border-radius: 50%;
  background: #fff; box-shadow: 0 2px 8px rgba(180,140,200,.25);
  font-size: 18px; color: #b565a7; visibility: hidden;
}
#barTitle { flex: 1; font-size: 18px; font-weight: 700; color: #9b59b6; text-align: center; }
#coinBox {
  background: #fff; border-radius: 20px; padding: 6px 12px;
  font-size: 15px; font-weight: 700; color: #e8a33d;
  box-shadow: 0 2px 8px rgba(180,140,200,.25);
}

/* ---- 主区 ---- */
#screens { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 4px 14px 20px; }
.screen { display: none; animation: fadeIn .25s ease; }
.screen.on { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ---- 底部导航 ---- */
#tabbar {
  flex: 0 0 auto; display: flex; background: rgba(255,255,255,.92);
  border-radius: 24px 24px 0 0; box-shadow: 0 -4px 16px rgba(180,140,200,.2);
  padding: 6px 6px calc(env(safe-area-inset-bottom, 0px) + 6px);
}
.tab { flex: 1; border: none; background: none; text-align: center; padding: 6px 0 4px; border-radius: 16px; }
.tab .ti { font-size: 24px; display: block; filter: grayscale(.6); transition: .15s; }
.tab .tn { font-size: 11px; color: #b8a8c8; }
.tab.on { background: #ffeaf4; }
.tab.on .ti { filter: none; transform: scale(1.12); }
.tab.on .tn { color: #e56ba0; font-weight: 700; }

/* ---- 通用卡片 / 按钮 ---- */
.card {
  background: rgba(255,255,255,.9); border-radius: 22px; padding: 16px;
  box-shadow: 0 4px 14px rgba(180,140,200,.18); margin-bottom: 14px;
}
.btn {
  display: block; width: 100%; border: none; border-radius: 18px;
  padding: 14px; font-size: 17px; font-weight: 700; color: #fff;
  background: linear-gradient(135deg, #ff9ec6, #b98ff0);
  box-shadow: 0 4px 12px rgba(230,120,180,.35);
  transition: transform .1s;
}
.btn:active { transform: scale(.96); }
.btn.ghost { background: #fff; color: #b565a7; box-shadow: 0 2px 8px rgba(180,140,200,.2); }
.btn.small { width: auto; display: inline-block; padding: 10px 20px; font-size: 15px; }
.btn:disabled { opacity: .45; }

/* ---- 首页 ---- */
#petCard { text-align: center; position: relative; overflow: hidden; }
#streakChip { position: absolute; top: 12px; left: 12px; background: #fff3d6; color: #e8842d; font-size: 13px; font-weight: 700; border-radius: 14px; padding: 4px 10px; }
#petEmoji { font-size: 84px; line-height: 1.2; display: inline-block; transition: transform .15s; }
#petEmoji.bounce { animation: bounce .5s; }
@keyframes bounce { 0%,100% { transform: none; } 30% { transform: translateY(-16px) scale(1.08); } 60% { transform: translateY(0) scale(.95); } }
#petStage { font-size: 17px; font-weight: 700; color: #9b59b6; margin-top: 2px; }
#petTip { font-size: 12px; color: #b8a8c8; margin-top: 2px; }
.xpbarWrap { background: #f0e8f8; border-radius: 10px; height: 12px; margin: 10px 24px 4px; overflow: hidden; }
.xpbar { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #ffd166, #ff9ec6); transition: width .4s; }
#xpText { font-size: 11px; color: #c0b0d0; }
.sectionTitle { font-size: 15px; font-weight: 700; color: #9b59b6; margin: 4px 2px 8px; }
.taskRow { display: flex; align-items: center; gap: 10px; padding: 9px 4px; border-bottom: 1px dashed #f0e0ee; }
.taskRow:last-child { border-bottom: none; }
.taskRow .tIcon { font-size: 22px; }
.taskRow .tName { flex: 1; font-size: 14px; }
.taskRow .tProg { font-size: 13px; color: #c0a0d0; font-weight: 700; }
.taskRow.done .tName { color: #b8d0a8; text-decoration: line-through; }
.taskRow.done .tProg { color: #7cc576; }
.homeGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.homeGrid .card { margin-bottom: 0; text-align: center; padding: 14px 8px; }
.homeGrid .hIcon { font-size: 34px; }
.homeGrid .hName { font-size: 14px; font-weight: 700; margin-top: 4px; }
.homeGrid .hSub { font-size: 11px; color: #c0a8d0; margin-top: 2px; }

/* ---- 地图 ---- */
.bookLabel { text-align: center; font-size: 14px; font-weight: 700; color: #b98ff0; margin: 10px 0 8px; }
.unitCard { display: flex; align-items: center; gap: 12px; }
.unitCard.locked { opacity: .55; filter: grayscale(.7); }
.unitIcon { font-size: 38px; }
.unitInfo { flex: 1; }
.unitName { font-size: 16px; font-weight: 700; color: #7a5a9a; }
.unitZh { font-size: 12px; color: #b8a8c8; }
.unitStars { font-size: 16px; letter-spacing: 2px; }
.unitProg { font-size: 11px; color: #c0a8d0; margin-top: 2px; }

/* ---- 单元页 ---- */
.actRow { display: flex; align-items: center; gap: 12px; }
.actRow .aIcon { font-size: 32px; }
.actRow .aName { flex: 1; font-size: 16px; font-weight: 700; color: #7a5a9a; }
.actRow .aSub { font-size: 12px; color: #b8a8c8; font-weight: 400; display: block; }
.actRow .aGo { font-size: 20px; color: #e5a0c8; }

/* ---- 学单词 ---- */
#learnCard { text-align: center; padding: 30px 16px; }
#lcEmoji { font-size: 96px; }
#lcWord { font-size: 34px; font-weight: 800; color: #6a4a8a; margin-top: 8px; letter-spacing: 1px; }
#lcZh { font-size: 18px; color: #b08ac0; margin-top: 4px; }
#lcSpeak { margin-top: 14px; font-size: 30px; border: none; background: #fff0f7; border-radius: 50%; width: 64px; height: 64px; box-shadow: 0 3px 10px rgba(230,120,180,.25); }
#learnProg { text-align: center; font-size: 13px; color: #c0a8d0; margin-bottom: 8px; }

/* ---- 魔法孵化：翻卡 ---- */
.flipWrap { background: none; box-shadow: none; padding: 0; perspective: 1000px; }
.flipInner { position: relative; width: 100%; min-height: 250px; transition: transform .6s; transform-style: preserve-3d; }
.flipWrap.flipped .flipInner { transform: rotateY(180deg); }
.flipBack, .flipFront {
  position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden;
  background: rgba(255,255,255,.92); border-radius: 22px; box-shadow: 0 4px 14px rgba(180,140,200,.18);
  display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px;
}
.flipBack { background: linear-gradient(135deg,#ffeaf4,#ece5ff); animation: shimmer 2s ease-in-out infinite; }
@keyframes shimmer { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }
.flipFront { transform: rotateY(180deg); }
.flipFront #lcEmoji { font-size: 76px; }
.flipFront #lcWord { font-size: 32px; }

/* ---- 单词进度灯 ---- */
#wordLights { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
.wl {
  width: 34px; height: 34px; border-radius: 50%; background: #fff; display: flex;
  align-items: center; justify-content: center; font-size: 17px; color: #e0d0ee;
  box-shadow: 0 2px 6px rgba(180,140,200,.2); transition: .3s;
}
.wl.on { background: #eefae8; box-shadow: 0 0 10px rgba(124,197,118,.6); transform: scale(1.08); }
.wl.cur { background: #fff3d6; color: #e8a33d; animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }

/* ---- 连击 ---- */
.comboTag {
  text-align: center; font-size: 15px; font-weight: 800; color: #e8842d;
  background: #fff3d6; border-radius: 14px; padding: 5px; margin-bottom: 8px;
  animation: popIn .3s;
}

/* ---- 闪电轮倒计时 ---- */
.timerWrap { height: 8px; background: #f0e8f8; border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
.timerBar { height: 100%; width: 100%; border-radius: 8px; background: linear-gradient(90deg,#7cc576,#ffd166); transition: width .1s linear; }

.petEat { animation: bounce .6s; }
.btn.pop { animation: popIn .35s; }

/* ---- 游戏区通用 ---- */
#playHead { text-align: center; margin-bottom: 10px; }
#playProg { font-size: 13px; color: #c0a8d0; }
#playQ { text-align: center; padding: 22px 14px; }
#playQ .qEmoji { font-size: 72px; }
#playQ .qText { font-size: 24px; font-weight: 800; color: #6a4a8a; margin-top: 6px; }
#playQ .qSub { font-size: 15px; color: #b08ac0; margin-top: 4px; }
.optGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.optBtn {
  border: 3px solid transparent; border-radius: 20px; background: #fff;
  padding: 14px 6px; text-align: center; font-size: 15px; font-weight: 700; color: #6a4a8a;
  box-shadow: 0 3px 10px rgba(180,140,200,.18);
}
.optBtn .oEmoji { font-size: 40px; display: block; }
.optBtn.right { border-color: #7cc576; background: #eefae8; }
.optBtn.wrong { border-color: #f08080; background: #ffecec; animation: shake .35s; }
@keyframes shake { 0%,100% { transform: none; } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

/* 配对 */
.matchCols { display: flex; gap: 12px; }
.matchCol { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.mItem {
  border: 3px solid transparent; border-radius: 16px; background: #fff;
  padding: 12px 4px; text-align: center; font-size: 15px; font-weight: 700; color: #6a4a8a;
  box-shadow: 0 3px 8px rgba(180,140,200,.18); transition: .15s;
}
.mItem .me { font-size: 28px; }
.mItem.sel { border-color: #b98ff0; background: #f3ecff; transform: scale(1.04); }
.mItem.ok { opacity: 0; pointer-events: none; transform: scale(.5); }
.mItem.bad { border-color: #f08080; animation: shake .35s; }

/* 拼写 */
#spellSlots { display: flex; justify-content: center; gap: 6px; flex-wrap: wrap; min-height: 46px; margin: 14px 0; }
.slot { width: 38px; height: 44px; border-radius: 10px; background: #fff; box-shadow: inset 0 -3px 0 #eadcf2; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: #6a4a8a; }
.slot.fill { background: #f3ecff; }
#spellKeys { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.key { width: 44px; height: 50px; border: none; border-radius: 12px; background: #fff; font-size: 20px; font-weight: 800; color: #8a5aaa; box-shadow: 0 3px 8px rgba(180,140,200,.22); }
.key:disabled { opacity: .25; }
#spellDel { background: #ffe8ee; color: #e56ba0; width: auto; padding: 0 16px; }

/* 句子 */
#sentAns { min-height: 52px; background: rgba(255,255,255,.7); border-radius: 16px; padding: 8px; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
#sentPool { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.chip { border: none; border-radius: 12px; background: #fff; padding: 9px 13px; font-size: 16px; font-weight: 700; color: #6a4a8a; box-shadow: 0 3px 8px rgba(180,140,200,.22); }
#sentAns .chip { background: #f3ecff; }
#sentAns.good { background: #eefae8; }
#sentAns.bad { animation: shake .35s; }

/* ---- 结算页 ---- */
#scr-result { text-align: center; padding-top: 30px; }
#resStars { font-size: 46px; letter-spacing: 6px; }
#resTitle { font-size: 24px; font-weight: 800; color: #9b59b6; margin: 8px 0 4px; }
#resDetail { font-size: 15px; color: #b08ac0; margin-bottom: 6px; }
#resCoins { font-size: 20px; font-weight: 800; color: #e8a33d; margin-bottom: 20px; }

/* ---- 扭蛋 ---- */
#gachaBox { text-align: center; padding: 26px 16px; }
#gachaEgg { font-size: 100px; display: inline-block; }
#gachaEgg.shake { animation: eggshake .8s; }
@keyframes eggshake { 0%,100% { transform: none; } 15% { transform: rotate(-14deg); } 30% { transform: rotate(12deg); } 45% { transform: rotate(-10deg); } 60% { transform: rotate(8deg); } 75% { transform: rotate(-5deg); } }
#gachaResult { min-height: 120px; margin-top: 8px; }
.stickerCard { display: inline-block; border-radius: 20px; padding: 14px 26px; animation: popIn .4s; }
@keyframes popIn { from { transform: scale(.3); opacity: 0; } to { transform: none; opacity: 1; } }
.stickerCard .se { font-size: 60px; }
.stickerCard .sn { font-size: 15px; font-weight: 700; margin-top: 4px; }
.r1 { background: #f0f6ff; color: #6a90c0; } .r2 { background: #f3ecff; color: #9b59b6; }
.r3 { background: linear-gradient(135deg, #fff3d6, #ffe0ef); color: #e8842d; box-shadow: 0 0 18px rgba(255,200,80,.7); }
.albumGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.albumCell { background: #fff; border-radius: 16px; text-align: center; padding: 10px 2px 8px; box-shadow: 0 2px 8px rgba(180,140,200,.15); }
.albumCell .ae { font-size: 32px; }
.albumCell .an { font-size: 10px; color: #b8a8c8; margin-top: 2px; }
.albumCell.no .ae { filter: grayscale(1); opacity: .25; }
.albumCell.rr3 { background: #fff8e8; }

/* ---- 幸运转盘 ---- */
#wheelWrap { position: relative; width: 272px; height: 272px; margin: 6px auto 2px; }
#wheel {
  width: 100%; height: 100%; border-radius: 50%;
  border: 9px solid #fff; box-shadow: 0 6px 18px rgba(180,140,200,.35);
  transition: transform 4s cubic-bezier(.15,.65,.1,1);
}
.wLabel { position: absolute; inset: 9px; text-align: center; pointer-events: none; }
.wLabel span { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 700; color: #6a4a8a; width: 62px; line-height: 1.25; }
#wheelPtr { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 30px; z-index: 2; text-shadow: 0 2px 4px rgba(0,0,0,.15); }
#wheelHub { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 52px; height: 52px; border-radius: 50%; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.15); display: flex; align-items: center; justify-content: center; font-size: 26px; z-index: 1; }
#ticketChip { text-align: center; font-size: 14px; font-weight: 700; color: #e8842d; margin: 8px 0 10px; }
.wonCard { text-align: center; border-radius: 20px; padding: 16px; background: linear-gradient(135deg,#fff3d6,#ffe0ef); animation: popIn .4s; margin-bottom: 12px; }
.wonCard .we { font-size: 46px; }
.wonCard .wn { font-size: 17px; font-weight: 800; color: #e8842d; margin-top: 4px; }

/* ---- 奖励券 ---- */
.vRow { display: flex; align-items: center; gap: 10px; padding: 11px 4px; border-bottom: 1px dashed #f0e0ee; }
.vRow:last-child { border-bottom: none; }
.vName { flex: 1; font-size: 14px; font-weight: 700; color: #7a5a9a; }
.vDate { font-size: 11px; color: #c0a8d0; display: block; font-weight: 400; margin-top: 2px; }
.vBtn { border: none; border-radius: 14px; padding: 8px 14px; font-size: 13px; font-weight: 700; }
.vBtn.todo { background: linear-gradient(135deg,#ffd166,#ff9ec6); color: #fff; }
.vBtn.warn { background: #ff8fab; color: #fff; }
.vBtn.used { background: #f0e8f8; color: #c0b0d0; }

/* ---- 家长设置 ---- */
.pRow { display: flex; align-items: center; gap: 8px; padding: 8px 2px; border-bottom: 1px dashed #f0e0ee; }
.pRow .pName { flex: 1; font-size: 14px; color: #7a5a9a; font-weight: 700; }
.pDel { border: none; background: #ffecec; color: #e05a5a; width: 30px; height: 30px; border-radius: 50%; font-size: 15px; font-weight: 700; }
.pInput { flex: 1; border: 2px solid #eadcf2; border-radius: 14px; padding: 10px 12px; font-size: 14px; color: #5a4a6a; background: #fff; outline: none; }
.pInput:focus { border-color: #b98ff0; }
#parentLink { text-align: center; font-size: 12px; color: #c0b0d0; padding: 10px; text-decoration: underline; }

/* ---- 主题换装屋 ---- */
.themeCard { display: flex; align-items: center; gap: 12px; }
.themeSwatch { width: 56px; height: 56px; border-radius: 16px; box-shadow: 0 3px 8px rgba(0,0,0,.15); flex: none; }
.themeName { flex: 1; font-size: 15px; font-weight: 700; color: #7a5a9a; }
.themeSub { font-size: 11px; color: #b8a8c8; font-weight: 400; display: block; margin-top: 2px; }
.themeBtn { border: none; border-radius: 14px; padding: 9px 14px; font-size: 13px; font-weight: 700; color: #fff; background: linear-gradient(135deg,#ff9ec6,#b98ff0); white-space: nowrap; }
.themeBtn.cur { background: #7cc576; }
.themeBtn.lock { background: #d8cce8; }

/* ===== 皮肤：薄荷仙子 ===== */
body.th-mint { background: linear-gradient(160deg,#dff7e8 0%,#e0f0ff 55%,#eafff5 100%); }
body.th-mint .btn:not(.ghost) { background: linear-gradient(135deg,#5ec99a,#7db8f0); box-shadow: 0 4px 12px rgba(90,190,150,.35); }
body.th-mint #barTitle, body.th-mint .sectionTitle, body.th-mint #petStage, body.th-mint #resTitle, body.th-mint .bookLabel, body.th-mint .btn.ghost, body.th-mint #backBtn { color: #2f9e6e; }
body.th-mint .tab.on { background: #dff5ea; }
body.th-mint .tab.on .tn { color: #2f9e6e; }

/* ===== 皮肤：美人鱼之海 ===== */
body.th-ocean { background: linear-gradient(160deg,#d5f0ff 0%,#e0e5ff 55%,#e5faff 100%); }
body.th-ocean .btn:not(.ghost) { background: linear-gradient(135deg,#5eb8e8,#8a9af0); box-shadow: 0 4px 12px rgba(90,150,220,.35); }
body.th-ocean #barTitle, body.th-ocean .sectionTitle, body.th-ocean #petStage, body.th-ocean #resTitle, body.th-ocean .bookLabel, body.th-ocean .btn.ghost, body.th-ocean #backBtn { color: #2f7ec0; }
body.th-ocean .tab.on { background: #ddf0fb; }
body.th-ocean .tab.on .tn { color: #2f7ec0; }

/* ===== 皮肤：蜜桃汽水 ===== */
body.th-peach { background: linear-gradient(160deg,#ffe8d5 0%,#ffd9e2 55%,#fff3d9 100%); }
body.th-peach .btn:not(.ghost) { background: linear-gradient(135deg,#ffab5e,#ff8fab); box-shadow: 0 4px 12px rgba(240,150,90,.4); }
body.th-peach #barTitle, body.th-peach .sectionTitle, body.th-peach #petStage, body.th-peach #resTitle, body.th-peach .bookLabel, body.th-peach .btn.ghost, body.th-peach #backBtn { color: #e0742d; }
body.th-peach .tab.on { background: #ffeedd; }
body.th-peach .tab.on .tn { color: #e0742d; }

/* ===== 皮肤：星空魔法（夜间） ===== */
body.th-night { background: linear-gradient(160deg,#252040 0%,#352a55 55%,#1f2a48 100%); color: #cfc4e8; }
body.th-night .card, body.th-night #tabbar { background: rgba(56,47,88,.94); box-shadow: 0 4px 14px rgba(0,0,0,.35); }
body.th-night #coinBox, body.th-night #backBtn, body.th-night .optBtn, body.th-night .mItem, body.th-night .key, body.th-night .slot, body.th-night .chip, body.th-night .albumCell, body.th-night .pInput { background: #473a6e; color: #e8dff8; box-shadow: 0 3px 8px rgba(0,0,0,.3); }
body.th-night .btn:not(.ghost) { background: linear-gradient(135deg,#8a6ad0,#5a7ae0); box-shadow: 0 4px 12px rgba(60,40,120,.5); }
body.th-night .btn.ghost { background: #473a6e; color: #cfc4e8; }
body.th-night #barTitle, body.th-night .sectionTitle, body.th-night #petStage, body.th-night #resTitle, body.th-night .bookLabel, body.th-night .unitName, body.th-night .actRow .aName, body.th-night .themeName, body.th-night .vName, body.th-night .pName { color: #cfc0ee; }
body.th-night #lcWord, body.th-night #playQ .qText, body.th-night #resStars { color: #e8dff8; }
body.th-night #lcZh, body.th-night #playQ .qSub, body.th-night .unitZh, body.th-night .unitProg, body.th-night .actRow .aSub, body.th-night #petTip, body.th-night #xpText, body.th-night .homeGrid .hSub, body.th-night #learnProg, body.th-night #playProg, body.th-night #resDetail, body.th-night .taskRow .tName, body.th-night .themeSub, body.th-night .vDate, body.th-night .albumCell .an, body.th-night #parentLink { color: #9a8cc0; }
body.th-night .taskRow, body.th-night .vRow, body.th-night .pRow { border-color: #4a3d70; }
body.th-night .xpbarWrap { background: #2a2348; }
body.th-night .tab .tn { color: #8a7ab0; }
body.th-night .tab.on { background: #473a6e; }
body.th-night .tab.on .tn { color: #cfc0ee; }
body.th-night #sentAns { background: rgba(70,58,110,.6); }
body.th-night #sentAns .chip { background: #5a4a8a; }
body.th-night .slot { box-shadow: inset 0 -3px 0 #352a55; }
body.th-night .slot.fill { background: #5a4a8a; }
body.th-night .mItem.sel { background: #5a4a8a; border-color: #8a6ad0; }
body.th-night #lcSpeak { background: #473a6e; }
body.th-night .wLabel span { color: #4a3a6a; }
body.th-night .albumCell.rr3 { background: #5a4a30; }
body.th-night #toast { background: rgba(230,220,255,.95); color: #352a55; }

/* ---- 浮动反馈 ---- */
#toast {
  position: fixed; left: 50%; top: 18%; transform: translateX(-50%);
  background: rgba(90,60,110,.9); color: #fff; border-radius: 18px;
  padding: 10px 20px; font-size: 15px; font-weight: 700; z-index: 99;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
#toast.show { opacity: 1; }
.confetti { position: fixed; top: -40px; font-size: 26px; z-index: 98; pointer-events: none; animation: fall linear forwards; }
@keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
.coinFly { position: fixed; font-size: 22px; font-weight: 800; color: #e8a33d; z-index: 98; pointer-events: none; animation: flyUp 1s ease-out forwards; }
@keyframes flyUp { to { transform: translateY(-70px); opacity: 0; } }
</style>
